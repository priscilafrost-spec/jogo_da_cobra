<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cobra</title>
    <link rel="stylesheet" href="jogo.css">
</head>
<body>
    <!--HUD-->
    <div class="hud">
        <a href="index.html" class="btn-menu">Menu</a>
        <div class="hud-centro">
            <span class="label-hud">Pontuação</span>
            <span class="valor-hud" id="pontuacao">0</span>
        </div>
        <div class="hud-direita"></div>
            <span class="label-hud">Recorde</span>
            <span class="valor-hud" id="recorde">0</span>
    </div>
    <!--GRID DO JOGO-->
    <div class="arena">
        <div class="grade" id="grade"></div>
        <!--TELA GAME OVER-->
        <div class="overlay" id="overlay">
            <div class="overlay-conteudo">
                <p class="overlay-titulo" id="overlay-titulo">GAME OVER</p>
                <p class="overlay-pontos" id="overlay-pontos">0 pontos</p>
                <p class="overlay-recorde" id="overlay-recorde"></p>
                <button class="btn-reiniciar" onclick="reiniciar()">Jogar Novamente</button>
                <a href="index.html" class="btn-voltar">Voltar ao Menu</a>
            </div>
        </div>
    </div>
    <!--CONTROLES-->

    <div class="controles-smatphone">
        <div class="linha-controle">
            <button class="btn-direcao" onclick="mudarDirecao('ArrowUp')">▲</button>
        </div>
        <div class="linha-controle">
            <button class="btn-direcao" onclick="mudarDirecao('ArrowLeft')">◀</button>
            <button class="btn-direcao" onclick="mudarDirecao('ArrowDown')">▼</button>
            <button class="btn-direcao" onclick="mudarDirecao('ArrowRight')">▶</button>
        </div>
    </div>

    <sript src="jogo.js"></sript>
</body>
</html>
